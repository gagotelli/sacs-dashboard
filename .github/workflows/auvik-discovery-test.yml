name: Auvik API discovery (test)
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch a small sample of device inventory
        env:
          AUVIK_API_USERNAME: ${{ secrets.AUVIK_API_USERNAME }}
          AUVIK_API_KEY: ${{ secrets.AUVIK_API_KEY }}
          AUVIK_API_DOMAIN: ${{ secrets.AUVIK_API_DOMAIN }}
        run: |
          echo "=== authentication/info ==="
          curl -sS -g -u "$AUVIK_API_USERNAME:$AUVIK_API_KEY" \
            "https://$AUVIK_API_DOMAIN/v1/authentication/info" \
            -o auth.json -w "\nHTTP %{http_code}\n"
          jq '.' auth.json | head -c 3000

          echo ""
          echo "=== tenants matching 'Andrew' ==="
          curl -sS -g -u "$AUVIK_API_USERNAME:$AUVIK_API_KEY" \
            "https://$AUVIK_API_DOMAIN/v1/tenants" \
            -o tenants.json -w "\nHTTP %{http_code}\n"
          jq '[.data[]? | select(.attributes.name // "" | test("Andrew"; "i"))]' tenants.json | head -c 3000
          echo ""
          echo "=== raw tenants.json head (in case shape differs) ==="
          jq '.' tenants.json | head -c 2000

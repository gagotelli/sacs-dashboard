name: Auvik API discovery (test)
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch a small sample of device inventory
        env:
          AUVIK_API_USERNAME: ${{ secrets.AUVIK_API_USERNAME }}
          AUVIK_API_KEY: ${{ secrets.AUVIK_API_KEY }}
          AUVIK_API_DOMAIN: ${{ secrets.AUVIK_API_DOMAIN }}
        run: |
          TENANT_ID="1382977535538767613"

          echo "=== devices via tenants[]= ==="
          curl -sS -g -u "$AUVIK_API_USERNAME:$AUVIK_API_KEY" \
            "https://$AUVIK_API_DOMAIN/v1/inventory/device/info?tenants[]=$TENANT_ID&page[first]=5" \
            -o d1.json -w "\nHTTP %{http_code}\n"
          jq '.' d1.json | head -c 4000

          echo ""
          echo "=== devices via filter[tenants]= ==="
          curl -sS -g -u "$AUVIK_API_USERNAME:$AUVIK_API_KEY" \
            "https://$AUVIK_API_DOMAIN/v1/inventory/device/info?filter[tenants]=$TENANT_ID&page[first]=5" \
            -o d2.json -w "\nHTTP %{http_code}\n"
          jq '.' d2.json | head -c 4000
